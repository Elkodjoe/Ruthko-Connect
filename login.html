<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Ruthko Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    .gradient-text { background: linear-gradient(to right, #facc15, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .field { width: 100%; background: #111; border: 1px solid #27272a; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .field:focus { border-color: rgba(250,204,21,0.6); box-shadow: 0 0 0 3px rgba(250,204,21,0.08); }
    .field::placeholder { color: #52525b; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6">

  <!-- Background glow -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div style="position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(250,204,21,0.06) 0%,transparent 70%);"></div>
  </div>

  <div class="w-full max-w-sm relative">

    <!-- Logo -->
    <div class="text-center mb-10">
      <img src="images/logo.png" alt="Ruthko Logo" class="w-16 h-16 rounded-2xl object-cover mx-auto mb-4" onerror="this.style.display='none'">
      <h1 class="text-3xl font-bold gradient-text">Ruthko Connect</h1>
      <p class="text-zinc-500 text-sm mt-1">Admin Dashboard</p>
    </div>

    <!-- Sample mode notice -->
    <div id="sample-notice" class="mb-6 p-4 rounded-xl border border-yellow-500/30 bg-yellow-500/5 text-sm text-yellow-400">
      <strong>Sample mode:</strong> use any email + any password to log in.
    </div>

    <!-- Login form -->
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Email</label>
        <input id="login-email" type="email" required autocomplete="email" class="field" placeholder="admin@ruthko.com" value="admin@ruthko.com">
      </div>
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Password</label>
        <div class="relative">
          <input id="login-password" type="password" required autocomplete="current-password" class="field pr-12" placeholder="••••••••" value="admin123">
          <button type="button" id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 text-xs font-medium">Show</button>
        </div>
      </div>

      <div id="login-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3"></div>

      <button type="submit" id="login-btn" class="w-full py-4 rounded-xl font-bold text-black text-base transition" style="background:linear-gradient(135deg,#facc15,#f59e0b);">
        Sign In to Dashboard
      </button>
    </form>

    <!-- Divider -->
    <div class="mt-8 pt-6 border-t border-zinc-800 text-center space-y-2">
      <p class="text-xs text-zinc-600">Public pages — no login required</p>
      <div class="flex justify-center gap-4 text-sm">
        <a href="intake.html"   class="text-zinc-500 hover:text-white transition">Intake Forms</a>
        <a href="payments.html" class="text-zinc-500 hover:text-white transition">Payments</a>
      </div>
    </div>

  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/ruthko-auth.js"></script>
  <script>
    // If already logged in, go straight to dashboard
    (async function () {
      var cfg = window.RUTHKO_CONFIG;

      // Hide sample notice in live mode
      if (!cfg.sampleMode) {
        document.getElementById("sample-notice").style.display = "none";
        document.getElementById("login-email").value   = "";
        document.getElementById("login-password").value = "";
      }

      // Check existing session
      if (cfg.sampleMode) {
        if (sessionStorage.getItem("ruthko_admin_session")) {
          window.location.href = "index.html";
        }
      } else if (window.supabase) {
        var client  = window.supabase.createClient(cfg.supabase.url, cfg.supabase.anonKey);
        var result  = await client.auth.getSession();
        var session = result.data && result.data.session;
        if (session) window.location.href = "index.html";
      }
    })();

    // Toggle password visibility
    document.getElementById("toggle-pw").addEventListener("click", function () {
      var pw = document.getElementById("login-password");
      var isHidden = pw.type === "password";
      pw.type = isHidden ? "text" : "password";
      this.textContent = isHidden ? "Hide" : "Show";
    });

    // Submit
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      var btn   = document.getElementById("login-btn");
      var errEl = document.getElementById("login-error");
      var email = document.getElementById("login-email").value.trim();
      var pass  = document.getElementById("login-password").value;

      btn.textContent = "Signing in…";
      btn.disabled    = true;
      errEl.classList.add("hidden");

      var result = await RuthkoAuth.login(email, pass);

      if (result.ok) {
        window.location.href = "index.html";
      } else {
        errEl.textContent = result.error || "Login failed. Check your credentials.";
        errEl.classList.remove("hidden");
        btn.textContent = "Sign In to Dashboard";
        btn.disabled    = false;
      }
    });
  </script>

</body>
</html>
