<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Ruthko Connect | Review Candidates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: Inter, sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    .glass-inner { background: rgba(255,255,255,0.03); }
    .gradient-text { background: linear-gradient(to right, #facc15, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #facc15 0%, #f59e0b 100%); color: #000; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    input, textarea { outline: none; }
  </style>
  <script src="js/supabase-config.js"></script>
  <script src="js/employer-portal-auth.js"></script>
  <script src="js/employer-feedback-service.js"></script>
  <script src="js/employer-shortlist-review.js"></script>
</head>
<body class="min-h-screen bg-black text-white">

  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-black/80 backdrop-blur-md">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="employer-portal.html" class="text-zinc-400 hover:text-white text-sm">← Portal</a>
        <span class="font-bold gradient-text">Ruthko Connect</span>
      </div>
      <button onclick="epLogout()" class="px-4 py-2 rounded-xl bg-zinc-900 border border-zinc-700 font-bold text-sm">Logout</button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-10">

    <!-- Shortlist header -->
    <div id="esrHeader" class="mb-8">
      <p class="text-zinc-500">Loading…</p>
    </div>

    <!-- Candidate cards -->
    <div id="esrCandidates" class="space-y-6">
      <p class="text-zinc-500 text-sm">Loading candidates…</p>
    </div>

  </main>

</body>
</html>
