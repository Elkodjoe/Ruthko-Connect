<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Ruthko Connect | Candidate Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: Inter, sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    .glass-hover { transition: all .2s ease; }
    .glass-hover:hover { background: rgba(255,255,255,0.08); }
    .gradient-text { background: linear-gradient(to right, #facc15, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #facc15 0%, #f59e0b 100%); color: #000; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .nav-active { background: rgba(39,39,42,0.9); color: #facc15; }
    .auth-checking body { visibility: hidden; }
    input, textarea, select { outline: none; }
  </style>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/candidate-matching-service.js"></script>
  <script src="js/job-match-score.js"></script>
  <script src="js/employer-shortlists.js"></script>
  <script src="js/candidate-profile.js"></script>
</head>
<body class="min-h-screen bg-black text-white" data-page="talent-pool">

  <aside class="fixed left-0 top-0 z-50 h-full w-16 md:w-60 bg-black border-r border-zinc-800 flex flex-col">
    <div class="p-3 md:p-5 flex items-center gap-3 border-b border-zinc-900">
      <img src="images/logo.png" alt="Ruthko Logo" class="w-10 h-10 rounded-xl object-contain bg-white p-1 shrink-0" onerror="this.style.display='none';" />
      <div class="hidden md:block">
        <h1 class="font-bold text-base gradient-text">Ruthko Connect</h1>
        <p class="text-xs text-zinc-400">Admin Console</p>
      </div>
    </div>
    <nav class="flex-1 px-2 py-3 space-y-1 overflow-y-auto">
      <a href="admin.html" data-page="admin" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Dashboard</span></a>
      <a href="content-manager.html" data-page="content-manager" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="zap" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Quick Change</span></a>
      <a href="ai-studio.html" data-page="ai" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="sparkles" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">AI Studio</span></a>
      <a href="event-operations.html" data-page="event-ops" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="calendar-check" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Event Ops</span></a>
      <a href="reports.html" data-page="reports" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="bar-chart-3" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Reports</span></a>
      <a href="crm.html" data-page="crm" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="database" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">CRM & Sales</span></a>
      <a href="talent-pool.html" data-page="talent-pool" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="users-round" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Talent Pool</span></a>
      <a href="tasks.html" data-page="tasks" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="list-checks" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Tasks</span></a>
      <a href="campaigns.html" data-page="campaigns" class="nav-link w-full p-3 rounded-xl flex items-center gap-3 glass-hover transition text-sm"><i data-lucide="send" class="w-5 h-5 shrink-0"></i><span class="hidden md:inline font-medium">Campaigns</span></a>
    </nav>
    <div class="p-3 border-t border-zinc-800 space-y-2">
      <a href="talent-pool.html" class="hidden md:block text-center text-xs font-bold btn-secondary rounded-xl py-2">← Talent Pool</a>
      <button onclick="ruthkoLogout()" class="block md:hidden w-full text-center text-xs bg-zinc-900 border border-zinc-700 font-bold rounded-xl py-2">Exit</button>
    </div>
  </aside>

  <main class="ml-16 md:ml-60 min-h-screen">

    <header class="h-16 border-b border-zinc-800 bg-black/70 backdrop-blur-md flex items-center justify-between px-6 shrink-0 sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <a href="talent-pool.html" class="text-zinc-400 hover:text-white text-sm">← Talent Pool</a>
        <h1 class="text-xl font-bold">Candidate Profile</h1>
      </div>
      <div class="flex items-center gap-3">
        <div class="hidden md:block text-right">
          <div class="text-sm font-semibold">Ruthko Admin</div>
          <div class="text-xs text-zinc-400" data-admin-email>admin@ruthko.com</div>
        </div>
        <button onclick="ruthkoLogout()" class="hidden sm:inline-flex px-3 py-2 rounded-xl bg-zinc-900 border border-zinc-700 font-bold text-sm">Logout</button>
      </div>
    </header>

    <section class="p-6">

      <!-- Profile header -->
      <div id="cpHeader" class="glass border border-zinc-800 rounded-2xl p-6 mb-6">
        <p class="text-zinc-500">Loading candidate…</p>
      </div>

      <!-- Tabs -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button id="cpTab-overview"   onclick="cpSetTab('overview')"   class="btn-primary px-4 py-2 rounded-xl font-bold text-sm">Overview</button>
        <button id="cpTab-skills"     onclick="cpSetTab('skills')"     class="btn-secondary px-4 py-2 rounded-xl font-bold text-sm">Skills & Certs</button>
        <button id="cpTab-notes"      onclick="cpSetTab('notes')"      class="btn-secondary px-4 py-2 rounded-xl font-bold text-sm">Notes</button>
        <button id="cpTab-shortlists" onclick="cpSetTab('shortlists')" class="btn-secondary px-4 py-2 rounded-xl font-bold text-sm">Shortlists</button>
      </div>

      <!-- Tab sections -->
      <div id="cpSection-overview"   class=""></div>
      <div id="cpSection-skills"     class="hidden"></div>
      <div id="cpSection-notes"      class="hidden"></div>
      <div id="cpSection-shortlists" class="hidden"></div>

    </section>

  </main>

  <script>
    if (window.lucide) lucide.createIcons();
    (function () {
      var page = document.body.getAttribute('data-page');
      document.querySelectorAll('.nav-link').forEach(function (link) {
        if (link.getAttribute('data-page') === page) link.classList.add('nav-active');
      });
    })();
  </script>
</body>
</html>
